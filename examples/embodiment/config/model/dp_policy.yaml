# dp_policy：需将 RoboTwin 根目录加入 PYTHONPATH，例如:
#   export PYTHONPATH=/workspace/RoboTwin:/workspace/RLinf:$PYTHONPATH
model_type: "dp_policy"

# DP 权重：优先读环境变量 ROBOTWIN_DP_CKPT，否则使用下方默认路径（Docker /workspace 布局）
ckpt_path: ${oc.env:ROBOTWIN_DP_CKPT,/workspace/RoboTwin/policy/DP/checkpoints/place_empty_cup/latest.ckpt}

precision: "32"

num_action_chunks: 6
action_dim: 14
n_obs_steps: 3

is_lora: false
lora_rank: 32

use_dsrl: false

dsrl_state_dim: 14
dsrl_image_latent_dim: 64
dsrl_state_latent_dim: 64
dsrl_hidden_dims: [128, 128, 128]
dsrl_num_q_heads: 10
