# dp_policy
# - local：本进程加载 DP（需 PYTHONPATH 含 RoboTwin，且 diffusers/peft 等与 RoboTwin 一致）
# - remote：连接 RoboTwin/script/robotwin_dp_server.py，RLinf 不 import diffusion_policy/diffusers
model_type: "dp_policy"

expert_backend: ${oc.env:RLINF_DP_EXPERT_BACKEND,local}
# remote 时必填（或与 ROBOTWIN_DP_SERVER_ADDR 二选一由代码读取环境变量）
dp_server_addr: ${oc.env:ROBOTWIN_DP_SERVER_ADDR,}

# DP 权重：local 为本地路径；remote 为服务端 init 加载路径（需服务器可读）
ckpt_path: ${oc.env:ROBOTWIN_DP_CKPT,/workspace/RoboTwin/policy/DP/checkpoints/place_empty_cup/latest.ckpt}

precision: "32"

num_action_chunks: 6
action_dim: 14
n_obs_steps: 3

is_lora: false
lora_rank: 32

use_dsrl: false

dsrl_state_dim: 14
dsrl_image_latent_dim: 64
dsrl_state_latent_dim: 64
dsrl_hidden_dims: [128, 128, 128]
dsrl_num_q_heads: 10
