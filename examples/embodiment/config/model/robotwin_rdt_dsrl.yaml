# RoboTwin Remote RDT（冻结）+ DSRL 高斯噪声头 + SAC/Q。
# 当前复用 dp_policy 的 RL 壳子与 TCP 协议（robotwin_rdt_server）。
model_type: "robotwin_rdt_dsrl"

expert_backend: ${oc.env:RLINF_DP_EXPERT_BACKEND,remote}
dp_server_addr: ${oc.env:ROBOTWIN_RDT_SERVER_ADDR,127.0.0.1:8769}

ckpt_path: ${oc.env:ROBOTWIN_RDT_CKPT,/workspace/RoboTwin/policy/RDT/checkpoints/place_empty_cup/latest.safetensors}

precision: "32"

num_action_chunks: 8
action_dim: 14
n_obs_steps: 2

is_lora: false
lora_rank: 32

use_dsrl: true

dsrl_state_dim: 14
dsrl_image_latent_dim: 64
dsrl_state_latent_dim: 64
dsrl_hidden_dims: [128, 128, 128]
dsrl_num_q_heads: 10
