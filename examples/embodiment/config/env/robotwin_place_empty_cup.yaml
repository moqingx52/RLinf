env_type: robotwin
total_num_envs: null

# local: 本进程 import RoboTwin VectorEnv（依赖与 RoboTwin 一致）
# client: 仅 TCP 客户端，仿真在独立环境运行：先启动 RoboTwin/script/robotwin_env_server.py
backend: local
server_addr: "127.0.0.1:8765"
request_timeout: 300
heartbeat_interval_seconds: 20
# client 模式下启动时强校验（task/state/camera/horizon + check_seeds）
client_validate_at_init: true
expected_state_dim: 14
client_validate_embodiment: true
client_require_play_once_success: false

auto_reset: False
ignore_terminations: False

reward_coef: 1.0
use_custom_reward: True
use_rel_reward: True
# DP 单头桥接阶段建议 false，与 policy/DP/rlinf_adapter 一致
center_crop: False

seed: 0
group_size: 1
use_fixed_reset_state_ids: False
max_steps_per_rollout_epoch: 200
max_episode_steps: 200 # max episode steps for truncation

is_eval: False

assets_path: "/path/to/robotwin_assets"
seeds_path: "/path/to/robotwin/train_seeds.json"

video_cfg:
  save_video: True
  info_on_video: True
  video_base_dir: ${runner.logger.log_path}/video/train

enable_offload: False

# 多 EnvWorker：每个进程一个 server 端口，在训练顶层 yaml 里为 env.train.override_cfgs 按 rank 写 server_addr，例如:
# override_cfgs:
#   - { server_addr: "127.0.0.1:8765" }
#   - { server_addr: "127.0.0.1:8766" }

task_config:
  task_name: place_empty_cup
  step_lim: 200
  planner_backend: mplib # # Choices: ["curobo", "mplib"], defalut is "curobo"
  # if you want to modify the config, please check the following tutorial first:
  # https://robotwin-platform.github.io/doc/usage/configurations.html
  render_freq: 0
  episode_num: 100
  use_seed: false
  save_freq: 15
  # DP 官方示例常用 aloha-agilex + 14 维动作；与 actor.model.action_dim / expected_state_dim 对齐
  embodiment: [piper, piper, 0.6]
  language_num: 100
  domain_randomization:
    random_background: true
    cluttered_table: true
    clean_background_rate: 0.02
    random_head_camera_dis: 0
    random_table_height: 0.03
    random_light: true
    crazy_random_light_rate: 0.02
  camera:
    head_camera_type: D435
    wrist_camera_type: D435
    collect_head_camera: true
    collect_wrist_camera: false
  data_type:
    rgb: true
    third_view: false
    depth: false
    pointcloud: false
    observer: false
    endpose: false
    qpos: true
    mesh_segmentation: false
    actor_segmentation: false
  pcd_down_sample_num: 1024
  pcd_crop: true
  save_path: ./data
  # OIDN/svulkan2 debug: clear cache every step to reduce peak pressure.
  clear_cache_freq: 1
  collect_data: true
  eval_video_log: true