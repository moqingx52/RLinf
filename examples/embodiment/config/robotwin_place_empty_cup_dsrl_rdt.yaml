# Docker: 需 REPO_PATH / EMBODIED_PATH。RDT 推理默认走 remote（robotwin_rdt_server）。
defaults:
  - env/robotwin_place_empty_cup@env.train
  - env/robotwin_place_empty_cup@env.eval
  - model/robotwin_rdt_dsrl@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

robotwin_root: ${oc.env:ROBOTWIN_ROOT,/workspace/RoboTwin}

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    env, rollout, actor: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "robotwin_dsrl_rdt"
    logger_backends: ["tensorboard"]

  max_epochs: 20000
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: 40

algorithm:
  normalize_advantages: False
  kl_penalty: kl
  group_size: 1
  reward_coef: 5.0

  rollout_epoch: 1
  eval_rollout_epoch: 1

  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level

  update_epoch: 200
  adv_type: embodied_sac
  loss_type: embodied_sac
  loss_agg_func: "token-mean"

  agg_q: mean
  actor_agg_q: mean
  backup_entropy: False
  critic_subsample_size: 0
  critic_actor_ratio: 1

  bootstrap_type: standard
  gamma: 0.999
  tau: 0.005

  entropy_tuning:
    alpha_type: softplus
    initial_alpha: 1.0
    # RDT-170M uses the full diffusion initial-noise tensor as the DSRL action
    # (typically 64 * 14 = 896 dims). `auto_half_action_dim` starts less
    # aggressively than `-action_dim` and can be overridden for sweeps.
    target_entropy: ${oc.env:RLINF_RDT_DSRL_TARGET_ENTROPY,auto_half_action_dim}
    optim:
      lr: 3.0e-4
      lr_scheduler: torch_constant
      clip_grad: 10.0

  replay_buffer:
    enable_cache: True
    cache_size: 15000
    sample_window_size: 15000
    min_buffer_size: 10
    auto_save: False

  target_update_freq: 1
  target_update_type: all
  train_actor_steps: 10

  filter_rewards: False
  rewards_lower_bound: 0.1
  rewards_upper_bound: 0.9

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: False

  train:
    total_num_envs: 1
    reward_coef: ${algorithm.reward_coef}
    max_episode_steps: 500
    # Keep this divisible by actor.model.num_action_chunks. With 64-step RDT
    # chunks, 512 lets one rollout cover a full 500-step RoboTwin episode.
    max_steps_per_rollout_epoch: 512
    auto_reset: False
    group_size: ${algorithm.group_size}
    assets_path: ${robotwin_root}
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/train_seeds.json
    center_crop: False
    debug_reward_trace: True
    debug_action_trace: True
    backend: client
    server_addr: ${oc.env:ROBOTWIN_SERVER_ADDR,127.0.0.1:8765}
    client_validate_embodiment: true
    task_config:
      step_lim: 500
      embodiment: [aloha-agilex]
      camera:
        collect_wrist_camera: true
  eval:
    total_num_envs: 1
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 500
    reward_coef: ${algorithm.reward_coef}
    # Keep eval rollout aligned with the 64-step RDT server used by smoke eval.
    max_steps_per_rollout_epoch: 512
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    assets_path: ${robotwin_root}
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/eval_seeds.json
    center_crop: False
    debug_reward_trace: True
    debug_action_trace: True
    backend: client
    server_addr: ${oc.env:ROBOTWIN_SERVER_ADDR,127.0.0.1:8765}
    client_validate_embodiment: true
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval
    task_config:
      step_lim: 500
      embodiment: [aloha-agilex]
      camera:
        collect_wrist_camera: true

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  enable_offload: False
  pipeline_stage_num: 1
  collect_transitions: True
  collect_prev_infos: False

  model:
    model_path: ${actor.model.ckpt_path}
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 8
  global_batch_size: 16
  seed: 42
  enable_offload: False

  model:
    ckpt_path: ${oc.env:ROBOTWIN_RDT_CKPT,/workspace/RoboTwin/policy/RDT/checkpoints/place_empty_cup_only_170m/checkpoint-20000}
    expert_backend: remote
    dp_server_addr: ${oc.env:ROBOTWIN_RDT_SERVER_ADDR,127.0.0.1:8769}
    # Must match robotwin_rdt_server --n-action-steps. The current smoke eval
    # produced successes under the official 64-step RDT execution condition.
    num_action_chunks: 64
    action_dim: 14
    n_obs_steps: 2
    # Full RDT denoising noise dim, independent of executed chunk length.
    dsrl_action_noise_dim: 896
    use_dsrl: true
    # Keep early rollouts close to the smoke-eval RDT expert while still
    # allowing SAC to learn a steering correction through init_noise.
    dsrl_noise_scale: 0.05
    add_q_head: true
    q_head_type: "default"
    num_q_heads: 10
    precision: "32"

  optim:
    lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.96
    adam_eps: 1.0e-08
    clip_grad: 3.5

  critic_optim:
    lr: 3.0e-4
    clip_grad: 10.0
    lr_scheduler: torch_constant

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: True
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: float32
      reduce_dtype: float32
      buffer_dtype: float32

reward:
  use_reward_model: False

critic:
  use_critic_model: False
