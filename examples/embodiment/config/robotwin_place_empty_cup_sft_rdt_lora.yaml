# 第一阶段任务适配（RDT + LoRA）
defaults:
  - env/robotwin_place_empty_cup@env.train
  - env/robotwin_place_empty_cup@env.eval
  - model/rdt_lora@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

robotwin_root: ${oc.env:ROBOTWIN_ROOT,/workspace/RoboTwin}

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    env, rollout, actor: all

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "robotwin_sft_rdt_lora"
    logger_backends: ["tensorboard"]
  max_epochs: 400
  max_steps: -1
  only_eval: False
  val_check_interval: -1
  save_interval: 20

algorithm:
  normalize_advantages: False
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0
  rollout_epoch: 1
  eval_rollout_epoch: 1
  reward_type: chunk_level
  logprob_type: chunk_level
  entropy_type: token_level
  update_epoch: 1
  adv_type: gae
  loss_type: ppo
  loss_agg_func: "token-mean"
  ppo_mini_batch_size: 64
  ppo_micro_batch_size_per_gpu: 4
  ppo_epochs: 1
  gamma: 0.99
  gae_lambda: 0.95
  cliprange: 0.2
  critic_warmup: 0
  critic_loss_coef: 0.0
  entropy_coef: 0.0
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"
  enable_offload: true
  train:
    total_num_envs: 1
    reward_coef: ${algorithm.reward_coef}
    max_episode_steps: 198
    max_steps_per_rollout_epoch: 200
    auto_reset: False
    group_size: ${algorithm.group_size}
    assets_path: ${robotwin_root}
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/train_seeds.json
    center_crop: False
    backend: client
    server_addr: ${oc.env:ROBOTWIN_SERVER_ADDR,127.0.0.1:8765}
    client_validate_embodiment: true
    task_config:
      step_lim: 198
      embodiment: [aloha-agilex]
      camera:
        collect_wrist_camera: false
  eval:
    total_num_envs: 1
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 198
    reward_coef: ${algorithm.reward_coef}
    max_steps_per_rollout_epoch: 200
    group_size: 1
    use_fixed_reset_state_ids: True
    is_eval: True
    assets_path: ${robotwin_root}
    seeds_path: ${oc.env:REPO_PATH}/rlinf/envs/robotwin/seeds/eval_seeds.json
    center_crop: False
    backend: client
    server_addr: ${oc.env:ROBOTWIN_SERVER_ADDR,127.0.0.1:8765}
    client_validate_embodiment: true
    video_cfg:
      save_video: True
      video_base_dir: ${runner.logger.log_path}/video/eval
    task_config:
      step_lim: 198
      embodiment: [aloha-agilex]
      camera:
        collect_wrist_camera: false

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  enable_offload: true
  pipeline_stage_num: 1
  collect_transitions: True
  collect_prev_infos: True
  model:
    model_path: ${actor.model.ckpt_path}
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 1
  global_batch_size: 1
  seed: 42
  enable_offload: true
  model:
    add_value_head: false
    precision: "bf16"
    num_action_chunks: 8
    action_dim: 14
  optim:
    lr: 2.0e-5
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    clip_grad: 1.0
  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "full_shard"
    use_orig_params: true
    gradient_checkpointing: true
    mixed_precision:
      param_dtype: bf16
      reduce_dtype: bf16
      buffer_dtype: bf16

reward:
  use_reward_model: false

critic:
  use_critic_model: false
